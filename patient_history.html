<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OPD Report | HMS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-teal: #00a680;
      --bg-main: #f1f5f9;
      --text-dark: #1e293b;
      --text-light: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
    }

    /* Navbar */
    header {
      background: #0f172a;
      color: white;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container { max-width: 1100px; margin: 30px auto; padding: 0 24px; }

    /* The Main White Card */
    .report-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 40px;
      min-height: 80vh;
    }

    /* Lab Summary Style Header */
    .printable-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .hospital-title {
      color: var(--primary-teal);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
    }

    .report-subtitle {
      color: var(--text-light);
      font-size: 1.1rem;
      margin: 8px 0;
    }

    .report-meta {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 15px;
    }

    .teal-line {
      height: 2px;
      background-color: var(--primary-teal);
      width: 100%;
      margin: 20px 0;
    }

    /* Action Bar (Buttons) */
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .btn-group { display: flex; gap: 10px; }

    .btn-view-print {
      background: var(--primary-teal);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Filters */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: white;
      color: var(--text-light);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-btn.active {
      background: #f0fdfa;
      color: var(--primary-teal);
      border-color: var(--primary-teal);
    }

    /* Table Styling */
    .table-wrapper { width: 100%; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    
    th {
      background: #f8fafc;
      padding: 14px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-light);
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 16px 14px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.95rem;
    }

    /* The "Image 2" Accent row effect */
    tr:hover { background-color: #f8fbfb; }
    .active-row {
      border-left: 4px solid var(--primary-teal);
      background-color: #f0fdfa !important;
    }

    .patient-name-cell { font-weight: 700; color: #1e293b; text-decoration: none; }
    .date-cell { color: var(--primary-teal); font-weight: 700; }

    /* Action Button in Table */
    .action-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--primary-teal);
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    @media print {
      body { background: white; }
      header, .action-bar, .filter-bar, .action-btn { display: none; }
      .container { margin: 0; padding: 0; max-width: 100%; }
      .report-card { box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-hospital-alt"></i> HMS PRO</div>
  <a href="staff.html" style="color: #94a3b8; text-decoration: none; font-weight: 600;">Dashboard</a>
</header>

<div class="container">
  <div class="action-bar">
    <button onclick="history.back()" style="border:none; background:none; cursor:pointer; color:var(--text-light); font-weight:600;">← Back</button>
    <div class="btn-group">
        <button class="btn-view-print" onclick="window.print()">
            <i class="fas fa-print"></i> Confirm & Save
          </button>
    </div>
  </div>

  <div class="report-card">
    <div class="printable-header">
      <h1 class="hospital-title">CITY HOSPITAL KOLHAPUR- PATIENT HISTORY</h1>
      <p class="report-subtitle">Daily Diagnostic Summary Report</p>
      <div class="report-meta">
        Generated: <span id="genDate">--/--/----</span> | Filter: <span id="activeFilterText" style="text-transform: uppercase;">ALL</span>
      </div>
      <div class="teal-line"></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-days="all">All</button>
      <button class="filter-btn" data-days="7">Week</button>
      <button class="filter-btn" data-days="30">Month</button>
      <button class="filter-btn" data-days="365">Year</button>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Visit Date</th>
            <th class="action-btn-col">Action</th>
          </tr>
        </thead>
        <tbody id="historyTableBody">
            </tbody>
      </table>
    </div>
  </div>
</div>

<script type="module" src="js/patient_history.js"></script>

</body>
</html>
