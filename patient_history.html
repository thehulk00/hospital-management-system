<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OPD Report | HMS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #2563eb;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-light: #64748b;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
    }

    header {
      background: #0f172a;
      color: white;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container { max-width: 1200px; margin: 30px auto; padding: 0 24px; }

    .report-header-card {
      background: white;
      padding: 24px 32px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 30px;
    }

    .report-title {
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back {
      background: #f1f5f9;
      color: #475569;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-view-print {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-bar { display: flex; gap: 12px; margin-bottom: 25px; }

    .filter-btn {
      padding: 10px 22px;
      border-radius: 25px;
      border: 1px solid #e2e8f0;
      background: white;
      color: #475569;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .table-container {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    table { width: 100%; border-collapse: collapse; }
    th { 
      padding: 16px 24px; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
      color: var(--text-light); 
      background: #f8fafc;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    td { padding: 18px 24px; font-size: 0.95rem; border-bottom: 1px solid #f1f5f9; }

    .date-link { color: var(--primary); text-decoration: none; font-weight: 600; }
    .patient-name { font-weight: 700; color: #1e293b; text-decoration: none; cursor: pointer; }
    .action-view-btn {
      border: 1px solid #e2e8f0;
      background: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--primary);
    }

    @media print { .filter-bar, .btn-back, header, .action-view-btn { display: none; } }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fas fa-hospital-alt"></i> HMS PRO</div>
  <a href="staff.html" style="color: #94a3b8; text-decoration: none; font-weight: 600;">Dashboard</a>
</header>

<div class="container">
  <div class="report-header-card">
    <h2 class="report-title">
      <i class="fas fa-file-waveform"></i> OPD Sequential Report
    </h2>
    <div style="display: flex; gap: 12px;">
      <button class="btn-back" onclick="history.back()">← Back</button>
      <button class="btn-view-print" onclick="window.print()">
        <i class="fas fa-eye"></i> View & Print
      </button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-days="all">All Reports</button>
    <button class="filter-btn" data-days="7">Last 7 Days</button>
    <button class="filter-btn" data-days="30">Last 30 Days</button>
    <button class="filter-btn" data-days="180">Last 6 Months</button>
    <button class="filter-btn" data-days="365">Last 1 Year</button>
  </div>

  <div class="table-container" id="reportContent">
    <table>
      <thead>
        <tr>
          <th>Visit Date</th>
          <th>Patient Name</th>
          <th>Consulting Doctor</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="historyTableBody"></tbody>
    </table>
  </div>
</div>

<script type="module" src="js/patient_history.js"></script>

</body>
</html>
