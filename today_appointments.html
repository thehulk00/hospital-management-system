<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Schedule | HMS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root {
    --accent: #6366f1; /* Indigo */
    --accent-soft: #eef2ff;
    --bg-main: #f3f4f6;
    --text-dark: #111827;
    --text-light: #6b7280;
    --white: #ffffff;
    --radius: 12px;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-dark);
    margin: 0;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
}

/* Glass Header */
.header {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    padding: 25px 30px;
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}

.header-title h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
}

.header-title p {
    margin: 5px 0 0 0;
    color: var(--text-light);
    font-size: 14px;
}

/* Actions */
.btn-group {
    display: flex;
    gap: 12px;
}

.btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
}

.btn-back {
    background: var(--white);
    color: var(--text-dark);
    border: 1px solid #e5e7eb;
}

.btn-print {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

/* The Data Card */
.card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    border: 1px solid #e5e7eb;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    background: #fafafa;
    padding: 18px 25px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-light);
    border-bottom: 2px solid #f3f4f6;
}

tbody td {
    padding: 20px 25px;
    border-bottom: 1px solid #f9fafb;
    font-size: 15px;
    color: var(--text-dark);
}

tbody tr:last-child td {
    border-bottom: none;
}

tbody tr:hover {
    background-color: #fcfdff;
}

/* Elements */
.patient-link {
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    transition: 0.2s;
}

.patient-link:hover {
    color: #4338ca;
}

.badge {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    display: inline-block;
}

.status-completed {
    background: #d1fae5;
    color: #065f46;
}

.status-pending {
    background: #ffedd5;
    color: #9a3412;
}

.complete-btn {
    background: #10b981;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.complete-btn:hover {
    background: #059669;
    box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
}

/* Time Highlight */
.time-col {
    font-weight: 700;
    color: var(--accent);
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="header-title">
            <h1>Today's Queue</h1>
            <p>You have <span style="color:var(--accent); font-weight:700;">Active</span> sessions running now.</p>
        </div>

        <div class="btn-group">
            <a href="staff.html" class="btn btn-back">
                <i class="fas fa-chevron-left"></i> Dashboard
            </a>

            <button onclick="openAppointmentPreview()" class="btn btn-print">
                <i class="fas fa-file-pdf"></i> Preview Report
            </button>
        </div>
    </div>

    <div class="card">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Time Slot</th>
                    <th>Patient Name</th>
                    <th>Medical Staff</th>
                    <th>Specialization</th>
                    <th>Status</th>
                    <th>Manage</th>
                </tr>
            </thead>
            <tbody id="appointmentsTable">
                </tbody>
        </table>
    </div>

</div>

<script type="module" src="js/today_appointments.js"></script>

</body>
</html>
