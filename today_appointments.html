<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Schedule | HMS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
:root {
    --accent: #6366f1; /* Indigo */
    --accent-soft: #eef2ff;
    --bg-main: #f3f4f6;
    --text-dark: #111827;
    --text-light: #6b7280;
    --white: #ffffff;
    --radius: 12px;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-dark);
    margin: 0;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
}

/* Glass Header */
.header {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    padding: 25px 30px;
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}

.header-title h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
}

.header-title p {
    margin: 5px 0 0 0;
    color: var(--text-light);
    font-size: 14px;
}

/* Actions */
.btn-group {
    display: flex;
    gap: 12px;
}

.btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
}

.btn-back {
    background: var(--white);
    color: var(--text-dark);
    border: 1px solid #e5e7eb;
}

.btn-print {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.btn-download {
    background: #10b981;
    color: white;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

/* The Data Card */
.card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    border: 1px solid #e5e7eb;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    background: #fafafa;
    padding: 18px 25px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-light);
    border-bottom: 2px solid #f3f4f6;
}

tbody td {
    padding: 20px 25px;
    border-bottom: 1px solid #f9fafb;
    font-size: 15px;
    color: var(--text-dark);
}

tbody tr:last-child td {
    border-bottom: none;
}

tbody tr:hover {
    background-color: #fcfdff;
}

/* Elements */
.patient-link {
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    transition: 0.2s;
}

.patient-link:hover {
    color: #4338ca;
}

.badge {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    display: inline-block;
}

.status-completed {
    background: #d1fae5;
    color: #065f46;
}

.status-pending {
    background: #ffedd5;
    color: #9a3412;
}

.complete-btn {
    background: #10b981;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.complete-btn:hover {
    background: #059669;
    box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
}

/* Time Highlight */
.time-col {
    font-weight: 700;
    color: var(--accent);
}

/* --- MODAL STYLES --- */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    width: 90%;
    max-width: 800px;
    max-height: 80vh;
    border-radius: var(--radius);
    padding: 30px;
    overflow-y: auto;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid #eee;
    padding-bottom: 15px;
}

.close-modal {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-light);
}

#previewArea table {
    font-size: 12px;
}

#previewArea th, #previewArea td {
    padding: 10px;
    border: 1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="header-title">
            <h1>Today's Queue</h1>
            <p>You have <span style="color:var(--accent); font-weight:700;">Active</span> sessions running now.</p>
        </div>

        <div class="btn-group">
            <a href="staff.html" class="btn btn-back">
                <i class="fas fa-chevron-left"></i> Dashboard
            </a>

            <button onclick="showPreview()" class="btn btn-print">
                <i class="fas fa-eye"></i> Preview Report
            </button>
        </div>
    </div>

    <div class="card">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Time Slot</th>
                    <th>Patient Name</th>
                    <th>Medical Staff</th>
                    <th>Specialization</th>
                    <th>Status</th>
                    <th>Manage</th>
                </tr>
            </thead>
            <tbody id="appointmentsTable">
                </tbody>
        </table>
    </div>

</div>

<div id="previewModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>TODAY'S APPOINTMENTS- CITY HOSPITAL KOLHAPUR</h2>
            <button class="close-modal" onclick="closePreview()">&times;</button>
        </div>
        
        <div id="previewArea">
            </div>

        <div class="btn-group" style="margin-top: 25px; justify-content: flex-end;">
            <button onclick="closePreview()" class="btn btn-back">Cancel</button>
            <button onclick="downloadPDF()" class="btn btn-download">
                <i class="fas fa-download"></i> Download PDF
            </button>
        </div>
    </div>
</div>

<script type="module" src="js/today_appointments.js"></script>

<script>
    function showPreview() {
        const modal = document.getElementById('previewModal');
        const previewArea = document.getElementById('previewArea');
        const mainTable = document.getElementById('mainTable');

        // Clone the table to show in preview
        const tableClone = mainTable.cloneNode(true);
        
        // Remove the 'Manage' column from preview for a cleaner report
        const rows = tableClone.querySelectorAll('tr');
        rows.forEach(row => {
            if (row.lastElementChild) {
                row.removeChild(row.lastElementChild);
            }
        });

        previewArea.innerHTML = '';
        previewArea.appendChild(tableClone);
        modal.style.display = 'flex';
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Add Title
        doc.setFontSize(18);
        doc.text("Today's Appointment's Report", 14, 20);
        
        // Add Date
        doc.setFontSize(11);
        doc.setTextColor(100);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 28);

        // Get data from the actual table (skipping the last 'Manage' column)
        const table = document.getElementById("mainTable");
        const headers = [["Time Slot", "Patient Name", "Medical Staff", "Specialization", "Status"]];
        const data = [];

        const rows = table.querySelectorAll("tbody tr");
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            // Only push the first 5 columns (skip Manage button)
            data.push([
                cols[0].innerText,
                cols[1].innerText,
                cols[2].innerText,
                cols[3].innerText,
                cols[4].innerText
            ]);
        });

        // Generate Table
        doc.autoTable({
            startY: 35,
            head: headers,
            body: data,
            theme: 'striped',
            headStyles: { fillColor: [99, 102, 241] }, // Indigo accent
            styles: { font: 'helvetica', fontSize: 10 }
        });

        doc.save(`Clinic_Schedule_${new Date().toISOString().slice(0,10)}.pdf`);
        closePreview();
    }

    // Close modal if user clicks outside of it
    window.onclick = function(event) {
        const modal = document.getElementById('previewModal');
        if (event.target == modal) {
            closePreview();
        }
    }
</script>

</body>
</html>
