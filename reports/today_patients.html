<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today's Patient Registrations</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#f3f4f6;
margin:0;
padding:40px;
color:#1f2937;
}

/* container */

.container{
max-width:1000px;
margin:auto;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* NEW: hospital header (hidden normally) */

.hospital-header{
display:none;
text-align:center;
margin-bottom:20px;
border-bottom:3px solid #2563eb;
padding-bottom:10px;
}

.hospital-header h2{
margin:0;
color:#2563eb;
font-size:22px;
font-weight:700;
}

.hospital-header p{
margin:5px 0 0;
font-size:14px;
color:#6b7280;
}

/* button */

.back-btn{
background:#111827;
color:white;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
font-weight:500;
font-size:14px;
transition:0.2s;
}

.back-btn:hover{
background:#374151;
}

/* PDF button */

.pdf-btn{
background:#2563eb;
color:white;
padding:10px 20px;
border-radius:10px;
border:none;
font-weight:500;
font-size:14px;
cursor:pointer;
margin-left:10px;
}

.pdf-btn:hover{
background:#1d4ed8;
}

/* table */

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
font-weight:600;
padding:14px;
background:#f9fafb;
font-size:14px;
color:#6b7280;
}

td{
padding:14px;
border-bottom:1px solid #f1f5f9;
font-size:15px;
}

tr:hover{
background:#fafafa;
}

/* patient link */

.patient-link{
color:#6366f1;
font-weight:600;
text-decoration:none;
}

.patient-link:hover{
text-decoration:underline;
}

/* empty state */

.empty{
text-align:center;
padding:30px;
color:#6b7280;
}

/* PRINT STYLE */

@media print {

body{
background:white;
padding:0;
}

.back-btn,
.pdf-btn,
.header{
display:none;
}

/* SHOW hospital header only in PDF */

.hospital-header{
display:block;
}

.container{
box-shadow:none;
border-radius:0;
padding:10px;
}

a{
color:black !important;
text-decoration:none;
}

}

</style>

</head>

<body>

<div class="container">

<!-- HOSPITAL HEADER (PRINT ONLY) -->
<div class="hospital-header">
<h2>CITY HOSPITAL KOLHAPUR</h2>
<p>Today's Patient Registrations</p>
</div>

<div class="header">
<h1>Today's Patient Registrations</h1>

<div>
<a href="../staff.html" class="back-btn">
← Back to Dashboard
</a>

<button class="pdf-btn" onclick="downloadPDF()">
Download PDF
</button>
</div>

</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Patient Name</th>
<th>Phone</th>
<th>Gender</th>
<th>Age</th>
</tr>
</thead>

<tbody id="todayPatients">
<tr>
<td colspan="5" class="empty">Loading today's patients...</td>
</tr>
</tbody>

</table>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const table = document.getElementById("todayPatients");

async function loadTodayPatients(){

table.innerHTML = "";

const todayString = new Date().toISOString().split("T")[0];

const snap = await getDocs(collection(db,"patients"));

snap.forEach(doc => {

const d = doc.data();

if(!d.createdAt) return;

const patientDate = d.createdAt.toDate();
const patientDateString = patientDate.toISOString().split("T")[0];

if(patientDateString === todayString){

table.innerHTML += `
<tr>
<td>${patientDateString}</td>

<td>
<a class="patient-link" href="./patient_profile.html?id=${doc.id}">
${d.name}
</a>
</td>

<td>${d.phone}</td>
<td>${d.gender}</td>
<td>${d.age}</td>

</tr>
`;

}

});

if(table.innerHTML === ""){
table.innerHTML = `<tr><td colspan="5" class="empty">No patients registered today</td></tr>`;
}

}

loadTodayPatients();

/* PDF */
window.downloadPDF = function(){
window.print();
};

</script>

</body>
</html>
