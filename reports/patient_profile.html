<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter;
background:#f3f4f6;
margin:0;
padding:40px;
color:#1f2937;
}

/* container */

.container{
max-width:700px;
margin:auto;
background:white;
padding:35px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{
margin:0;
font-size:26px;
}

/* back button */

.back-btn{
background:#111827;
color:white;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
font-weight:500;
font-size:14px;
transition:0.2s;
}

.back-btn:hover{
background:#374151;
}

/* rows */

.row{
margin-bottom:14px;
padding:12px;
background:#f9fafb;
border-radius:8px;
}

.label{
font-weight:600;
color:#6b7280;
margin-right:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Patient Profile</h2>

<a href="./today_patients.html" class="back-btn">
← Back to Today's Patients
</a>

</div>

<div class="row"><span class="label">Name:</span> <span id="name"></span></div>
<div class="row"><span class="label">Email:</span> <span id="email"></span></div>
<div class="row"><span class="label">Phone:</span> <span id="phone"></span></div>
<div class="row"><span class="label">Gender:</span> <span id="gender"></span></div>
<div class="row"><span class="label">Age:</span> <span id="age"></span></div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const ref = doc(db,"patients",id);
const snap = await getDoc(ref);

if(snap.exists()){

const d = snap.data();

document.getElementById("name").innerText = d.name;
document.getElementById("email").innerText = d.email;
document.getElementById("phone").innerText = d.phone;
document.getElementById("gender").innerText = d.gender;
document.getElementById("age").innerText = d.age;

}

</script>

</body>
</html>
