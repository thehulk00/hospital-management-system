<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinical Records | HMS PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 40px; display: flex; justify-content: center; }
    .container { background: white; width: 100%; max-width: 650px; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 2px solid #f8fafc; padding-bottom: 20px; }
    .header h2 { margin: 0; color: #1e293b; font-size: 1.5rem; }
    .date-badge { background: #e0e7ff; color: #4338ca; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; }
    
    .vitals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .vital-card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
    .label { font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
    .value { font-size: 18px; color: #1e293b; font-weight: 600; }
    
    .obs-section { background: #ffffff; border: 1px solid #e2e8f0; padding: 25px; border-radius: 16px; min-height: 150px; position: relative; margin-top: 20px; }
    .obs-section::before { content: "Symptoms & Clinical Observations"; position: absolute; top: -10px; left: 20px; background: white; padding: 0 10px; font-size: 11px; font-weight: 800; color: #6366f1; }
    .obs-content { white-space: pre-wrap; line-height: 1.6; color: #334155; font-size: 15px; }
    
    .back-btn { margin-top: 30px; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #64748b; font-weight: 600; font-size: 14px; transition: 0.2s; }
    .back-btn:hover { color: #6366f1; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h2 id="pName">Loading Patient...</h2>
      <p style="margin: 5px 0 0; color: #64748b; font-weight: 500;">Attending: <span id="dName">Dr. --</span></p>
    </div>
    <div class="date-badge" id="vDate">-- Feb 2026</div>
  </div>

  <div class="vitals-row">
    <div class="vital-card">
      <div class="label"><i class="fas fa-heartbeat"></i> Blood Pressure</div>
      <div class="value" id="vBP">--/--</div>
    </div>
    <div class="vital-card">
      <div class="label"><i class="fas fa-thermometer-half"></i> Temperature</div>
      <div class="value" id="vTemp">-- °F</div>
    </div>
  </div>

  <div class="obs-section">
    <div id="vObs" class="obs-content">Loading observations...</div>
  </div>

  <a href="opd_report.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Report</a>
</div>

<script type="module">
  import { db } from "../js/firebase.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const docId = params.get('id');

  async function loadVisitData() {
    if (!docId) return;

    try {
        const docRef = doc(db, "opd_visits", docId);
        const snap = await getDoc(docRef);

        if (snap.exists()) {
          const data = snap.data();
          
          // --- FIX FOR "DR. DR." ---
          let rawDoctorName = data.doctorName || "Not Assigned";
          // If the name doesn't already start with "Dr.", add it. Otherwise, use it as is.
          let finalDoctorName = rawDoctorName.toLowerCase().startsWith("dr.") 
                                ? rawDoctorName 
                                : "Dr. " + rawDoctorName;

          document.getElementById('pName').innerText = data.patientName || "Unknown Patient";
          document.getElementById('dName').innerText = finalDoctorName;
          document.getElementById('vDate').innerText = data.visitDate || "N/A";
          
          // Mapping fields from your opd.js
          document.getElementById('vBP').innerText = data.bloodPressure || "Not Recorded";
          document.getElementById('vTemp').innerText = data.temperature ? `${data.temperature} °F` : "Not Recorded";
          document.getElementById('vObs').innerText = data.symptoms || "No observations recorded.";
          
        } else {
          document.getElementById('vObs').innerText = "Error: Record not found.";
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        document.getElementById('vObs').innerText = "Failed to load clinical data.";
    }
  }

  loadVisitData();
</script>
</body>
</html>
