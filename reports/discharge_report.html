<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discharge Summary Report | HMS</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --muted: #64748b; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-info h1 { font-size: 24px; font-weight: 700; margin: 0; }
        .header-info p { color: var(--muted); margin-top: 5px; font-size: 14px; }

        /* Filter Bar Styling */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .filter-pill { padding: 8px 18px; background: white; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }

        .btn-group { display: flex; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; border: none; }
        .btn-back { background: var(--white); color: var(--text); border: 1px solid #e2e8f0; }
        .btn-pdf { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 15px 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat-card small { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card div { font-weight: 700; font-size: 18px; color: var(--primary); margin-top: 4px; }

        .card { background: var(--white); border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid #e2e8f0; text-align: left; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .patient-link { font-weight: 700; color: var(--primary); text-decoration: none; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; background: #eff6ff; color: #2563eb; font-weight: 600; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 2% auto; padding: 40px; border-radius: 24px; width: 90%; max-width: 1100px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-info">
            <h1>🏥 Discharge Summary Report</h1>
            <p id="currentDate"></p>
        </div>
        <div class="btn-group">
            <a href="../staff.html" class="btn btn-back"><i class="fas fa-arrow-left"></i> Back to Staff</a>
            <button onclick="openDischargePreview()" class="btn btn-pdf"><i class="fas fa-eye"></i> View & Print</button>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-pill active" onclick="updateFilter('all', this)">All Records</button>
        <button class="filter-pill" onclick="updateFilter('week', this)">Last 7 Days</button>
        <button class="filter-pill" onclick="updateFilter('month', this)">Last 30 Days</button>
        <button class="filter-pill" onclick="updateFilter('year', this)">Last 1 Year</button>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><small>Total Records</small><div id="totalCount">0</div></div>
        <div class="stat-card"><small>Department</small><div>General Medicine</div></div>
        <div class="stat-card"><small>Report View</small><div id="filterLabel">All Discharges</div></div>
    </div>

    <div class="card">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Discharge Date</th>
                    <th>Diagnosis</th>
                    <th>Treatment</th>
                    <th>Advice</th>
                </tr>
            </thead>
            <tbody id="dischargeTable"></tbody>
        </table>
    </div>
</div>

<div id="previewModal" class="modal">
    <div class="modal-content">
        <div id="printArea"></div>
        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <button class="btn btn-pdf" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Confirm & Download</button>
            <button class="btn btn-back" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script type="module" src="../js/discharge_report.js"></script>
<script>
    document.getElementById('currentDate').innerText = `System Date: ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
    window.closeModal = function() { document.getElementById('previewModal').style.display='none'; }
</script>
</body>
</html>
