<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Access Logs | HMS PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
    
    .report-card { background: white; max-width: 1100px; margin: auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
    .header h1 { font-size: 24px; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 10px; }

    /* Filter Bar */
    .filter-bar { display: flex; gap: 15px; background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 30px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; }
    input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
    
    .btn-apply { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-print { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 15px; background: #f8fafc; font-size: 12px; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; }
    td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-login { background: #dcfce7; color: #166534; }
    .badge-logout { background: #fee2e2; color: #991b1b; }

    @media print {
      .filter-bar, .btn-print, .nav-back { display: none; }
      body { background: white; padding: 0; }
      .report-card { box-shadow: none; max-width: 100%; padding: 0; }
    }
  </style>
</head>
<body>

<div class="report-card">
  <div class="header">
    <h1><i class="fas fa-user-clock" style="color:var(--primary)"></i> System Access Logs</h1>
    <button onclick="window.print()" class="btn-print"><i class="fas fa-file-pdf"></i> Print PDF Report</button>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>Date Filter</label>
      <input type="date" id="filterDate">
    </div>
    <div class="filter-group">
      <label>Staff Email</label>
      <input type="text" id="filterEmail" placeholder="Search email...">
    </div>
    <button class="btn-apply" onclick="fetchLogs()">Apply Filters</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Event Date</th>
        <th>Exact Time</th>
        <th>Staff Member</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="logsBody">
      </tbody>
  </table>

  <p style="margin-top: 30px;"><a href="../staff.html" class="nav-back" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Back to Dashboard</a></p>
</div>

<script type="module">
  import { db } from "../js/firebase.js";
  import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  window.fetchLogs = async function() {
    const logsBody = document.getElementById("logsBody");
    const fDate = document.getElementById("filterDate").value;
    const fEmail = document.getElementById("filterEmail").value.toLowerCase();
    
    logsBody.innerHTML = "<tr><td colspan='4'>Syncing logs...</td></tr>";

    try {
      let q = query(collection(db, "audit_logs"), orderBy("timestamp", "desc"));

      // Date Filtering
      if(fDate) {
        q = query(collection(db, "audit_logs"), where("dateOnly", "==", fDate), orderBy("timestamp", "desc"));
      }

      const snap = await getDocs(q);
      logsBody.innerHTML = "";

      snap.forEach(doc => {
        const data = doc.data();
        
        // Email Filtering (Client-side)
        if(fEmail && !data.userEmail.toLowerCase().includes(fEmail)) return;

        const ts = data.timestamp?.toDate() || new Date();
        const dateStr = ts.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        const timeStr = ts.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const row = `
          <tr>
            <td>${dateStr}</td>
            <td>${timeStr}</td>
            <td><strong>${data.userEmail}</strong></td>
            <td>
              <span class="badge ${data.action === 'Login' ? 'badge-login' : 'badge-logout'}">
                ${data.action.toUpperCase()}
              </span>
            </td>
          </tr>
        `;
        logsBody.innerHTML += row;
      });

      if(logsBody.innerHTML === "") logsBody.innerHTML = "<tr><td colspan='4'>No activity logs found.</td></tr>";

    } catch (err) {
      console.error(err);
      logsBody.innerHTML = "<tr><td colspan='4' style='color:red'>Error loading logs. Please check Firestore indexes.</td></tr>";
    }
  }

  // Initial load
  fetchLogs();
</script>

</body>
</html>
