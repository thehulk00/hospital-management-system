<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Medical Record | HMS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#2563eb;
--bg:#f1f5f9;
--card:#ffffff;
--text:#1e293b;
--muted:#64748b;
--border:#e2e8f0;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
margin:0;
padding:40px;
color:var(--text);
}

/* container */

.container{
max-width:1000px;
margin:auto;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.back-btn{
text-decoration:none;
color:var(--muted);
font-weight:600;
}

.back-btn:hover{
color:var(--primary);
}

.print-btn{
background:var(--primary);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* patient card */

.patient-card{
background:var(--card);
border-radius:18px;
padding:30px;
display:grid;
grid-template-columns:120px 1fr;
gap:30px;
border:1px solid var(--border);
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.avatar{
width:120px;
height:120px;
border-radius:16px;
background:#dbeafe;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:700;
color:var(--primary);
}

.patient-info h1{
margin:0;
font-size:28px;
}

.patient-id{
color:var(--muted);
font-size:14px;
margin-top:4px;
}

/* info grid */

.info-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:25px;
}

.info-box{
background:#f8fafc;
padding:14px;
border-radius:10px;
}

.info-box label{
font-size:11px;
font-weight:700;
color:var(--muted);
display:block;
margin-bottom:4px;
}

.info-box p{
margin:0;
font-weight:600;
}

/* section */

.section{
margin-top:35px;
}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:12px;
display:flex;
align-items:center;
gap:10px;
}

.card{
background:white;
border:1px solid var(--border);
border-radius:14px;
padding:22px;
line-height:1.6;
}

/* contact */

.contact-row{
display:flex;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.contact-item{
background:#f8fafc;
padding:8px 12px;
border-radius:8px;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
}

/* print */

@media print{
.header{display:none}
body{background:white;padding:0}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<a href="javascript:history.back()" class="back-btn">
<i class="fas fa-arrow-left"></i> Back
</a>

<button class="print-btn" onclick="window.print()">
<i class="fas fa-print"></i> Print Record
</button>
</div>

<div class="patient-card">

<div class="avatar" id="initials">?</div>

<div class="patient-info">

<h1 id="pName">Loading...</h1>
<div class="patient-id" id="pID">Patient ID</div>

<div class="info-grid">

<div class="info-box">
<label>Doctor</label>
<p id="dName">--</p>
</div>

<div class="info-box">
<label>Department</label>
<p id="pDept">--</p>
</div>

<div class="info-box">
<label>Visit Date</label>
<p id="pDate">--</p>
</div>

</div>

<div class="contact-row" id="contactInfo"></div>

</div>

</div>

<!-- Diagnosis -->

<div class="section">

<div class="section-title">
<i class="fas fa-stethoscope"></i> Diagnosis
</div>

<div class="card">
<p id="pDiagnosis">--</p>
</div>

</div>

<!-- Treatment -->

<div class="section">

<div class="section-title">
<i class="fas fa-pills"></i> Treatment Plan
</div>

<div class="card">

<p><strong>Treatment</strong></p>
<p id="pTreatment">--</p>

<br>

<p><strong>Medical Advice</strong></p>
<p id="pAdvice">--</p>

</div>

</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const docId = params.get("id");

async function fetchPatient(){

const ref = doc(db,"appointments",docId);
const snap = await getDoc(ref);

if(!snap.exists()){
document.getElementById("pName").innerText="Patient not found";
return;
}

const data = snap.data();

document.getElementById("pName").innerText=data.patientName;
document.getElementById("initials").innerText=data.patientName.charAt(0).toUpperCase();
document.getElementById("pID").innerText="Patient ID: "+docId;

document.getElementById("dName").innerText=data.doctorName;
document.getElementById("pDept").innerText=data.department;
document.getElementById("pDate").innerText=data.date;

document.getElementById("pDiagnosis").innerText=data.diagnosis || "No diagnosis recorded";
document.getElementById("pTreatment").innerText=data.treatment || "Not prescribed";
document.getElementById("pAdvice").innerText=data.advice || "No advice provided";

document.getElementById("contactInfo").innerHTML=
`
<div class="contact-item"><i class="fas fa-phone"></i> ${data.phone || "No phone"}</div>
<div class="contact-item"><i class="fas fa-envelope"></i> ${data.email || "No email"}</div>
`;

}

fetchPatient();

</script>

</body>
</html>
