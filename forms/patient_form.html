<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Registration | HMS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1; /* Indigo Modern */
      --primary-hover: #4f46e5;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-light: #64748b;
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 500px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    h2 {
      margin: 0 0 8px 0;
      color: var(--text-dark);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    p {
      margin: 0 0 32px 0;
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .back {
      margin-top: 24px;
      text-align: center;
    }

    .back a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back a:hover {
      color: var(--primary);
    }

    /* Icon within form labels for that extra modern touch */
    .label-icon {
      font-size: 1rem;
      margin-right: 4px;
      color: var(--primary);
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Patient Registration</h2>
  <p>Fill in the details below to add a new patient to the HMS system.</p>

  <div class="form-group">
    <label><i class="fas fa-user label-icon"></i> Patient Name</label>
    <input type="text" id="name" placeholder="e.g. Johnathan Doe">
  </div>

  <div class="form-group">
    <label><i class="fas fa-envelope label-icon"></i> Email Address</label>
    <input type="email" id="email" placeholder="name@example.com">
  </div>

  <div class="form-group">
    <label><i class="fas fa-phone label-icon"></i> Phone Number</label>
    <input type="tel" id="phone" placeholder="+1 (555) 000-0000">
  </div>

  <div class="form-group">
    <label><i class="fas fa-venus-mars label-icon"></i> Gender</label>
    <select id="gender">
      <option value="">Select gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-group">
    <label><i class="fas fa-calendar-alt label-icon"></i> Age</label>
    <input type="number" id="age" placeholder="Enter age">
  </div>

  <button onclick="savePatient()">Create Patient Record</button>

  <div class="back">
    <a href="../staff.html"><i class="fas fa-chevron-left"></i> Return to Dashboard</a>
  </div>
</div>

<script type="module" src="../js/patient.js"></script>

</body>
</html>
