<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Appointment | HMS PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Inter',sans-serif;
background:#f8fafc;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

.topbar{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-weight:700;
font-size:20px;
}

.center-wrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.card{
background:white;
padding:40px;
width:420px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
text-align:center;
margin-top:0;
}

label{
font-weight:600;
display:block;
margin-top:18px;
margin-bottom:6px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e2e8f0;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#6366f1;
}

button{
margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
font-weight:700;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4f46e5;
}

.emergency{
margin-top:15px;
display:flex;
align-items:center;
gap:8px;
}

</style>
</head>

<body>

<header class="topbar">
<i class="fas fa-hospital"></i> City Hospital HMS
</header>

<div class="center-wrapper">

<form id="appointmentForm" class="card">

<h2><i class="fas fa-calendar-plus"></i> Book Appointment</h2>

<label>Patient Name</label>
<input type="text" id="patientName" placeholder="Enter patient name" required>

<label>Select Doctor</label>
<select id="doctorSelect" required>
<option value="">Loading doctors...</option>
</select>

<label>Appointment Date</label>
<input type="date" id="date" required>

<label>Time Slot</label>
<select id="timeSlot" required>

<option value="">Select Time</option>

<option>09:00 AM</option>
<option>09:30 AM</option>
<option>10:00 AM</option>
<option>10:30 AM</option>
<option>11:00 AM</option>
<option>11:30 AM</option>

<option>02:00 PM</option>
<option>02:30 PM</option>
<option>03:00 PM</option>
<option>03:30 PM</option>
<option>04:00 PM</option>
<option>04:30 PM</option>

</select>

<div class="emergency">
<input type="checkbox" id="isEmergency">
<label>Emergency Appointment</label>
</div>

<button type="submit">
<i class="fas fa-check"></i> Confirm Appointment
</button>

</form>

</div>

<script type="module" src="../js/appointment.js"></script>

</body>
</html>
