<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Management | HMS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-light: #64748b;
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 520px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 8px 0;
      color: var(--text-dark);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sub-text {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .input-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-icon {
      color: var(--primary);
      font-size: 0.9rem;
      width: 18px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    /* Grid for Role and Shift */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
      margin-top: 20px;
      text-decoration: none;
      color: var(--text-light);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back:hover {
      color: var(--primary);
    }
  </style>
</head>

<body>

<div class="card">
  <h2><i class="fas fa-user-shield" style="color: var(--primary);"></i> Staff Management</h2>
  <p class="sub-text">Register and assign shifts for clinical and administrative staff.</p>

  <span class="input-label"><i class="fas fa-user label-icon"></i> Full Name</span>
  <input type="text" id="name" placeholder="Enter name">

  <div class="form-row">
    <div>
      <span class="input-label"><i class="fas fa-envelope label-icon"></i> Email</span>
      <input type="email" id="email" placeholder="email@hms.com">
    </div>
    <div>
      <span class="input-label"><i class="fas fa-phone label-icon"></i> Phone</span>
      <input type="text" id="phone" placeholder="Phone">
    </div>
  </div>

  <span class="input-label"><i class="fas fa-briefcase label-icon"></i> Designation / Role</span>
  <select id="role">
    <option value="">Select Role</option>
    <option value="staff">Administrative Staff</option>
    <option value="nurse">Registered Nurse</option>
  </select>

  <div class="form-row">
    <div>
      <span class="input-label"><i class="fas fa-hospital-user label-icon"></i> Department</span>
      <input type="text" id="department" placeholder="e.g. ICU, OPD">
    </div>
    <div>
      <span class="input-label"><i class="fas fa-clock label-icon"></i> Assigned Shift</span>
      <input type="text" id="shift" placeholder="e.g. Morning">
    </div>
  </div>

  <button onclick="saveStaff()">Add Staff Member</button>

  <a href="../staff.html" class="back">
    <i class="fas fa-arrow-left"></i> Return to Dashboard
  </a>
</div>

<script type="module" src="../js/staff.js"></script>

</body>
</html>
