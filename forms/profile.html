<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile | HMS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-main: #f8fafc;
      --text-dark: #1e293b;
      --text-light: #64748b;
      --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.04), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar styling */
    .topbar {
      background: #0f172a;
      color: white;
      padding: 1rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: white;
    }

    /* Form Layout */
    .form-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 480px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
      position: relative;
    }

    /* Profile Header Styling */
    .profile-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .avatar-placeholder {
      width: 80px;
      height: 80px;
      background: #eef2ff;
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 15px;
      border: 3px solid #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.025em;
    }

    /* Form Elements */
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 16px;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-icon {
      color: var(--primary);
      font-size: 0.9rem;
      width: 18px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 0.95rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    input:disabled {
      background-color: #f1f5f9;
      color: var(--text-light);
      cursor: not-allowed;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      width: 100%;
      margin-top: 30px;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo"><i class="fas fa-hospital-alt"></i> HMS PRO</div>
  <a href="../patient.html" class="back-link"><i class="fas fa-chevron-left"></i> Dashboard</a>
</header>

<main class="form-wrapper">
  <div class="card">
    <div class="profile-header">
      <div class="avatar-placeholder">
        <i class="fas fa-user"></i>
      </div>
      <h2>Personal Profile</h2>
    </div>

    <form id="profileForm">
      <label><i class="fas fa-id-card label-icon"></i> Full Name</label>
      <input type="text" id="name" placeholder="Loading name..." required />

      <label><i class="fas fa-envelope label-icon"></i> Email Address</label>
      <input type="email" id="email" disabled />

      <label><i class="fas fa-phone label-icon"></i> Phone Number</label>
      <input type="text" id="phone" placeholder="Enter contact number" />

      <div class="form-row">
        <div>
          <label><i class="fas fa-birthday-cake label-icon"></i> Age</label>
          <input type="number" id="age" placeholder="Age" />
        </div>
        <div>
          <label><i class="fas fa-venus-mars label-icon"></i> Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <button type="submit">Save Changes</button>
    </form>
  </div>
</main>

<script type="module" src="../js/profile.js"></script>
</body>
</html>
