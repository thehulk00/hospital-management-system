<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Patient Registration | City Hospital Kolhapur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--primary:#2dd4bf;
--navy-dark:#0f172a;
--glass:rgba(255,255,255,0.95);
}

*{
box-sizing:border-box;
font-family:"Plus Jakarta Sans",sans-serif;
}

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at center,#1e293b,#0f172a);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-card{
background:var(--glass);
width:100%;
max-width:420px;
padding:50px 40px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.4);
box-shadow:0 40px 100px rgba(0,0,0,0.4);
position:relative;
overflow:hidden;
animation:fadeUp .6s cubic-bezier(.23,1,.32,1);
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.register-card::before{
content:'';
position:absolute;
top:-50px;
left:50%;
transform:translateX(-50%);
width:200px;
height:100px;
background:var(--primary);
filter:blur(60px);
opacity:.2;
}

.logo{
text-align:center;
font-size:24px;
font-weight:800;
color:var(--navy-dark);
margin-bottom:8px;
}

h2{
text-align:center;
margin:0;
color:var(--navy-dark);
font-weight:800;
font-size:26px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#64748b;
margin:10px 0 35px;
}

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group i{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
color:#94a3b8;
font-size:18px;
pointer-events:none;
}

label{
display:block;
font-size:13px;
font-weight:700;
margin-bottom:8px;
margin-left:5px;
color:var(--navy-dark);
text-transform:uppercase;
letter-spacing:.5px;
}

input,select{
width:100%;
padding:16px 16px 16px 52px;
border-radius:18px;
border:1px solid #e2e8f0;
background:#f8fafc;
font-size:15px;
font-weight:500;
outline:none;
transition:.3s;
color:var(--navy-dark);
appearance:none;
}

input:focus,select:focus{
border-color:var(--primary);
background:#fff;
box-shadow:0 0 0 4px rgba(45,212,191,0.1);
}

button{
width:100%;
padding:18px;
background:var(--navy-dark);
color:#fff;
border:none;
border-radius:18px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
margin-top:10px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

button:hover{
background:var(--primary);
color:var(--navy-dark);
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(45,212,191,.3);
}

.back-link{
display:block;
text-align:center;
margin-top:25px;
font-size:14px;
color:#64748b;
text-decoration:none;
font-weight:600;
}

.back-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

<div class="register-card">

<div class="logo">
<i class="fas fa-city" style="color:var(--primary);"></i> City Hospital Kolhapur
</div>

<h2>Create Account</h2>
<p class="subtitle">Join our patient portal for 24/7 access</p>


<label for="email">Email Address</label>
<div class="input-group">
<i class="fas fa-envelope"></i>
<input type="email" id="email" placeholder="name@example.com">
</div>


<label for="password">Security Password</label>
<div class="input-group">
<i class="fas fa-lock"></i>
<input type="password" id="password" placeholder="Create a strong password">
</div>


<label for="name">Full Name</label>
<div class="input-group">
<i class="fas fa-user"></i>
<input type="text" id="name" placeholder="Full Name">
</div>


<label for="phone">Phone Number</label>
<div class="input-group">
<i class="fas fa-phone"></i>
<input type="text" id="phone" placeholder="Phone Number">
</div>


<label for="age">Age</label>
<div class="input-group">
<i class="fas fa-birthday-cake"></i>
<input type="number" id="age" placeholder="Age">
</div>


<label for="gender">Gender</label>
<div class="input-group">
<i class="fas fa-venus-mars"></i>

<select id="gender">
<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Prefer not to say">Prefer not to say</option>
</select>

</div>


<button id="registerBtn" type="button">
Complete Registration <i class="fas fa-user-plus"></i>
</button>


<a href="index.html" class="back-link">
<i class="fas fa-arrow-left"></i> Back to Login
</a>

</div>

<script type="module" src="./js/register.js"></script>

</body>
</html>
